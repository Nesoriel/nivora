name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false
      - name: Resolve CozeLoop dependencies and formatting once
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          go get github.com/cloudwego/eino-ext/callbacks/cozeloop@latest
          go get github.com/coze-dev/cozeloop-go@latest
          go mod tidy
          gofmt -w .
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add go.mod go.sum -- '*.go'
            git commit -m "build: add CozeLoop integration dependencies"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build -trimpath ./...
